<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeuSomelier</title>
  <link rel="shortcut icon" href="/img/whitek.jpg" type="image/x-icon">

  <meta name="description" content="about me."/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://www.seusomelier.com.br/"/>

  <meta property="og:title" content="seusomelier"/>
  <meta property="og:description" content="about me."/>
  <meta property="og:url" content="https://www.seusomelier.com.br/"/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="https://www.seusomelier.com.br/img/diva.jpg"/>

  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="seusomelier"/>
  <meta name="twitter:description" content="about me."/>
  <meta name="twitter:image" content="https://www.seusomelier.com.br/img/diva.jpg"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --frame-bg: #000000;
      --bg: #09131c;
      --bg-top: #0b141b;
      --line: rgba(255,255,255,.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #25d366;
      --avatar: #ededed;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --phone-width: min(100vw, 430px);
      --phone-height: 100dvh;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      min-height: 100dvh;
      font-family: 'Inter', sans-serif;
      background: var(--frame-bg);
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }

    .viewport {
      width: var(--phone-width);
      height: var(--phone-height);
      background: linear-gradient(to bottom, var(--bg-top), var(--bg));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,.03);
    }

    .topbar {
      height: 74px;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .title {
      font-size: 23px;
      font-weight: 500;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 18px 0 28px;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
    }

    .avatar {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--avatar);
      box-shadow: 0 0 0 1px rgba(255,255,255,.04);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .edit {
      display: inline-block;
      margin-top: 14px;
      color: var(--accent);
      font-size: 18px;
      font-weight: 500;
      text-decoration: none;
    }

    .section {
      padding-inline: 40px;
    }

    .info-list {
      margin-top: 32px;
      display: grid;
      gap: 28px;
    }

    .info-item {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 12px;
      align-items: start;
    }

    .icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transform: translateY(4px);
    }

    .label {
      font-size: 18px;
      line-height: 1.15;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .value {
      font-size: 15px;
      line-height: 1.3;
      color: var(--muted);
      font-weight: 400;
      word-break: break-word;
    }

    svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
    }

    .links-section {
      margin-top: 34px;
    }

    .links-title {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 14px;
      font-weight: 600;
    }

    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .link-item {
      min-height: 40px;
      padding: 9px 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      transition: all var(--transition-interactive);
      overflow: hidden;
    }

    .link-item:hover {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.16);
    }

    .link-name {
      font-size: 8px;
      color: rgba(255,255,255,.48);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url {
      color: var(--accent);
      font-size: 10px;
      word-break: break-all;
      font-weight: 500;
      line-height: 1.2;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .add-link {
      margin-top: 18px;
      width: 100%;
      height: 44px;
      background: transparent;
      border: 1px dashed rgba(255,255,255,.42);
      border-radius: 999px;
      color: rgba(255,255,255,.56);
      cursor: pointer;
      font-size: 11px;
      transition: all .2s ease;
      text-align: center;
    }

    .add-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37,211,102,.05);
    }

    @media (min-width: 431px) {
      body {
        padding-inline: max(24px, calc((100vw - 430px) / 2));
      }
    }

    @media (max-width: 430px) {
      .viewport {
        width: 100vw;
      }
    }

    @media (max-width: 380px) {
      .section {
        padding-inline: 24px;
      }

      .avatar {
        width: 190px;
        height: 190px;
      }

      .links-grid {
        gap: 10px;
      }

      .link-item {
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <header class="topbar">
      <h1 class="title">Perfil</h1>
    </header>

    <main class="content">
      <section class="hero" aria-label="Foto de perfil">
        <div class="avatar">
          <img src="/img/whitek.jpg" alt="Foto de perfil" loading="lazy" />
        </div>
        <a href="#" class="edit">Editar</a>
      </section>

      <section class="section info-list" aria-label="Informações do perfil">
        <article class="info-item">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0"/>
              <circle cx="12" cy="8" r="4"/>
            </svg>
          </div>
          <div>
            <h2 class="label">Nome</h2>
            <p class="value">Luiz Fernando</p>
          </div>
        </article>

        <article class="info-item">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 8h.01"/>
              <path d="M11 12h1v4h1"/>
            </svg>
          </div>
          <div>
            <h2 class="label">Recado</h2>
            <p class="value">SPOILER: NO FINAL EU MORRO</p>
          </div>
        </article>

        <article class="info-item">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.62a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.46-1.29a2 2 0 0 1 2.11-.45c.84.3 1.72.51 2.62.63A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div>
            <h2 class="label">Telefone</h2>
            <p class="value">+55 73 9***-****</p>
          </div>
        </article>
      </section>

      <section class="section links-section" aria-label="Links do perfil">
        <h2 class="links-title">Links</h2>
        <div class="links-grid">
          <div class="link-item">
            <div class="link-name">YaIndex</div>
            <a href="https://yaindex.seusomelier.com.br" class="link-url" target="_blank" rel="noopener noreferrer">yaindex.seusomelier.com.br</a>
          </div>
          <div class="link-item">
            <div class="link-name">Reader</div>
            <a href="https://reader.seusomelier.com.br" class="link-url" target="_blank" rel="noopener noreferrer">reader.seusomelier.com.br</a>
          </div>
          <div class="link-item">
            <div class="link-name">Y2K Terminal</div>
            <a href="https://y2k.seusomelier.com.br" class="link-url" target="_blank" rel="noopener noreferrer">y2k.seusomelier.com.br</a>
          </div>
          <div class="link-item">
            <div class="link-name">Watch</div>
            <a href="https://watch.seusomelier.com.br" class="link-url" target="_blank" rel="noopener noreferrer">watch.seusomelier.com.br</a>
          </div>
          <div class="link-item">
            <div class="link-name">HYTL</div>
            <a href="https://hytl.seusomelier.com.br" class="link-url" target="_blank" rel="noopener noreferrer">hytl.seusomelier.com.br</a>
          </div>
        </div>
        <button class="add-link">Adicionar links</button>
      </section>
    </main>
  </div>
</body>
</html>
