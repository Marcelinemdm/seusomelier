<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luiz Fernando</title>
  <link rel="shortcut icon" href="img/472684011_18494965459009287_7220539255364855977_n (Edit).png" type="image/x-icon">

  <style>
    :root {
      --bg: #0f1115;
      --surface: #171a21;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 20px;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(var(--space-4), 4vw, var(--space-12));
      background:
        radial-gradient(circle at top, rgba(90, 110, 160, 0.18), transparent 35%),
        linear-gradient(180deg, #11141b 0%, var(--bg) 100%);
      font-family: Arial, sans-serif;
    }

    .frame {
      width: min(92vw, 640px);
      padding: clamp(var(--space-4), 2vw, var(--space-8));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame img {
      display: block;
      width: min(100%, 500px);
      height: auto;
      object-fit: contain;
      border-radius: 12px;
    }

    @media (max-width: 480px) {
      .frame {
        width: 100%;
        border-radius: 16px;
      }

      .frame img {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <img src="/img/whitek.jpg" alt="white kanye" width="500" height="500" />
  </main>
</body>
</html>
